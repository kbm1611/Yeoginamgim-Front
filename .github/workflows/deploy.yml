
name: React S3 Static Deploy   # [필수] GitHub Actions 이름 (가독성용)

on:                         # [필수] 언제 실행할지 정의

  push:                     # [필수] push 이벤트 기반 실행

    branches: [ "main" ]   # [★수정 가능] 배포를 트리거할 브랜치명 (예: main, master, dev 등)

jobs:                       # [필수] 작업(Job) 집합 정의

  build-and-deploy:         # [필수] Job 이름

    runs-on: ubuntu-latest  # [필수] 실행 OS (GitHub 제공 환경)

    steps:                  # [필수] 단계별 작업 정의

      # 1. Git Source Code Checkout

      - name: Checkout source                   # [필수] 소스코드 가져오기

        uses: actions/checkout@v3               # [필수] GitHub 공식 checkout 액션


      # 2. Node.js 설치

      - name: Set up Node.js                    # [필수] Node.js 환경 설정

        uses: actions/setup-node@v3             # [필수] 노드 설정 액션

        with:

          node-version: '20'                    # [★수정 가능] 프로젝트에서 사용하는 Node.js 버전으로 변경 (예: '18', '22')

          cache: 'npm'                          # [선택] 의존성 캐싱 (Yarn 사용 시 'yarn'으로 변경)

          cache-dependency-path: react/package-lock.json # [필수] 실제 React 프로젝트의 lock 파일 경로


      # 3. 의존성 패키지 설치

      - name: Install dependencies              # [필수] package.json 기반 패키지 설치

        working-directory: ./react              # [필수] React 프로젝트 폴더에서 실행

        run: npm ci                             # [선택] Yarn 사용 시 'yarn install --frozen-lockfile'로 변경

        

      # 4. Build (정적 자원 생성)

      - name: Build React Client                # [필수] React 정적 파일 빌드

        working-directory: ./react              # [필수] React 프로젝트 폴더에서 실행

        env:

          VITE_API_BASE_URL: https://dh7p4gzv38x71.cloudfront.net # [필수] 백엔드 API 서버 주소

          VITE_KAKAO_JAVASCRIPT_KEY: ${{ secrets.VITE_KAKAO_JAVASCRIPT_KEY }} # [필수] Kakao JavaScript 키

        run: npm run build                      # [필수] 빌드 스크립트 실행

        shell: bash                             # [필수] bash 쉘 사용


      # 5. AWS 인증 설정

      - name: Configure AWS Credentials         # [필수] AWS CLI 사용을 위한 자격증명 설정

        uses: aws-actions/configure-aws-credentials@v2 # [필수] AWS 공식 인증 액션

        with:

          # 아래 두 Secret 값은 GitHub Repository -> Settings -> Secrets and variables -> Actions에 등록해야 합니다.

          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}     # [필수] GitHub에 등록한 IAM Access Key ID

          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }} # [필수] GitHub에 등록한 IAM Secret Access Key

          aws-region: ap-northeast-2                              # [★수정 가능] 사용하는 AWS 리전 (서울이 아닐 경우 변경)


      # 6. S3 버킷으로 빌드 결과물 업로드 (배포)

      - name: Deploy to S3 Bucket               # [필수] S3 버킷에 동기화하는 단계

        # [★필수 수정] 

        # 1. Vite 기반 프로젝트인 경우: ./dist 사용

        # 2. CRA(Create React App) 기반 프로젝트인 경우: ./build 로 변경

        # 3. YOUR-S3-BUCKET-NAME 자리에 실제 생성한 AWS S3 버킷명을 정확히 입력하세요.

        working-directory: ./react              # [필수] 빌드 결과물이 생성되는 React 프로젝트 폴더에서 실행

        run: aws s3 sync ./dist s3://elasticbeanstalk-ap-northeast-2-988477084982 --delete

        shell: bash                             # [필수] bash 쉘 사용


      # 7. CloudFront 캐시 무효화

      - name: Invalidate CloudFront Cache

        env:

          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }}

        run: |

          if [ -n "$CLOUDFRONT_DISTRIBUTION_ID" ]; then

            aws cloudfront create-invalidation --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" --paths "/*"

          else

            echo "AWS_CLOUDFRONT_DISTRIBUTION_ID secret is not set. Skipping CloudFront invalidation."

          fi

        shell: bash
